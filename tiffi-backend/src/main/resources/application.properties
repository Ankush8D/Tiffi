# Server
server.port=8080
spring.application.name=tiffi-backend

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/tiffi_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# Timezone
spring.jackson.time-zone=Asia/Kolkata

# JWT
jwt.secret=tiffi_super_secret_key_change_in_production_min_32_chars
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000

# Firebase
firebase.credentials.path=src/main/resources/firebase-service-account.json

# Razorpay (test keys - fill when account ready)
razorpay.key.id=YOUR_RAZORPAY_KEY_ID
razorpay.key.secret=YOUR_RAZORPAY_KEY_SECRET

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.tiffi=DEBUG
logging.level.org.springframework.security=INFO
