services:
  - type: web
    name: tiffi-backend
    runtime: java
    plan: free
    javaVersion: "21"
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -Dspring.profiles.active=prod -jar target/tiffi-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tiffi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FIREBASE_CREDENTIALS_BASE64
        sync: false

databases:
  - name: tiffi-db
    plan: free
    databaseName: tiffi_db
    user: tiffi_user
